<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C5A26F"/>
      <stop offset="100%" style="stop-color:#8B6F47"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D35E"/>
      <stop offset="100%" style="stop-color:#E8A838"/>
    </linearGradient>
  </defs>
  <!-- Sun Rays -->
  <circle cx="50" cy="50" r="18" fill="url(#sun)"/>
  <g fill="#E8A838" opacity="0.6">
    <rect x="47" y="15" width="6" height="12" rx="1"/>
    <rect x="47" y="73" width="6" height="12" rx="1"/>
    <rect x="15" y="47" width="12" height="6" rx="1"/>
    <rect x="73" y="47" width="12" height="6" rx="1"/>
    <rect x="23" y="23" width="8" height="6" rx="1" transform="rotate(-45 27 26)"/>
    <rect x="69" y="69" width="8" height="6" rx="1" transform="rotate(-45 73 72)"/>
    <rect x="23" y="69" width="8" height="6" rx="1" transform="rotate(45 27 72)"/>
    <rect x="69" y="23" width="8" height="6" rx="1" transform="rotate(45 73 26)"/>
  </g>
  <!-- Elegant Solar Panel -->
  <rect x="28" y="32" width="44" height="36" rx="2" fill="#1F2E1F" stroke="#C5A26F" stroke-width="2"/>
  <g stroke="#C5A26F" stroke-width="1.5" opacity="0.9">
    <line x1="28" y1="41" x2="72" y2="41"/>
    <line x1="28" y1="50" x2="72" y2="50"/>
    <line x1="28" y1="59" x2="72" y2="59"/>
    <line x1="28" y1="68" x2="72" y2="68"/>
    <line x1="37" y1="32" x2="37" y2="68"/>
    <line x1="46" y1="32" x2="46" y2="68"/>
    <line x1="55" y1="32" x2="55" y2="68"/>
    <line x1="64" y1="32" x2="64" y2="68"/>
  </g>
  <!-- Reflection Highlight -->
  <rect x="32" y="35" width="18" height="6" rx="1" fill="#FFFFFF" opacity="0.35"/>
</svg>
